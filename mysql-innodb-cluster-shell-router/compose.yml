services:
  mysql-server-1:
    env_file: mysql-server.env
    image: mysql:8.4.8-oraclelinux9
    hostname: mysql-server-1
    ports:
      - "3301:3306"
    command: [
      "mysqld",
      "--server_id=1",
      "--gtid_mode=ON",
      "--enforce_gtid_consistency=ON",
      "--binlog_checksum=NONE",
      "--mysql_native_password=ON"
    ]

  mysql-server-2:
    env_file: mysql-server.env
    hostname: mysql-server-2
    image: mysql:8.4.8-oraclelinux9
    ports:
      - "3302:3306"
    command: ["mysqld","--server_id=2","--gtid_mode=ON","--enforce_gtid_consistency=ON","--binlog_checksum=NONE","--mysql_native_password=ON"]

  mysql-server-3:
    env_file: mysql-server.env
    hostname: mysql-server-3
    image: mysql:8.4.8-oraclelinux9
    ports:
      - "3303:3306"
    command: ["mysqld","--server_id=3","--gtid_mode=ON","--enforce_gtid_consistency=ON","--binlog_checksum=NONE","--mysql_native_password=ON"]

  mysql-shell:
    image: container-registry.oracle.com/mysql/community-server:8.4.8
    entrypoint: [ "mysqlsh" ]
    # El formato de la URI es: usuario:password@host:puerto
    command: [ "--uri", "root:mysql@mysql-server-1:3306" ]
    stdin_open: true
    tty: true
    depends_on:
      - mysql-server-1
      - mysql-server-2
      - mysql-server-3

  mysql-router:
    env_file: mysql-router.env
    image: percona/percona-mysql-router:8.4.0
    ports:
      - "6446:6446"
      - "6447:6447"
    depends_on:
      - mysql-server-1
      - mysql-server-2
      - mysql-server-3
    restart: on-failure